openapi: "3.0.0"
info:
  title: TODO API
  version: "1.0"
components:
  schemas:
    error:
      type: object
      properties:
        message:
          type: string
    todolist:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/task"
    task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
  parameters:
    todolistId:
      name: todolistId
      in: path
      required: true
      schema:
        type: string
    taskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
paths:
  /todolists:
    get:
      summary: List all todolists
      responses:
        "200":
          description: Get all todolists
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/todolist"
    post:
      summary: Create a todolist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
      responses:
        "201":
          description: Todolist created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/todolist"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
  /todolists/{todolistId}:
    parameters:
      - $ref: "#/components/parameters/todolistId"
    get:
      summary: Get a todolist by id
      responses:
        "200":
          description: Get a todolist by id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/todolist"
        "404":
          description: Todolist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
    patch:
      summary: Update a todolist by id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
      responses:
        "200":
          description: Update a todolist by id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/todolist"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "404":
          description: Todolist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
    delete:
      summary: Delete a todolist by id
      responses:
        "204":
          description: Delete a todolist by id
        "404":
          description: Todolist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
  /todolists/{todolistId}/tasks:
    parameters:
      - $ref: "#/components/parameters/todolistId"
    post:
      summary: Add a task to a todolist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Task added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/task"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "404":
          description: Todolist not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
  /todolists/{todolistId}/tasks/{taskId}:
    parameters:
      - $ref: "#/components/parameters/todolistId"
      - $ref: "#/components/parameters/taskId"
    get:
      summary: Get a task by id
      responses:
        "200":
          description: Get a task by id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/task"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
    patch:
      summary: Update a task by id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: Update task by id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/task"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
    delete:
      summary: Delete a task by id
      responses:
        "204":
          description: Delete a task by id
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
